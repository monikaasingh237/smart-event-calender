<!DOCTYPE html>
<html>
<head>
    <title>Event Calendar</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
        }

        .navbar{
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .calendar-header{
            text-align: center;
            margin: 20px;
        }

        button{
            padding: 8px 15px;
            cursor: pointer;
        }

        #monthYear{
            font-size: 22px;
            font-weight: bold;
            margin: 0 20px;
        }

        .calendar{
            width: 90%;
            margin: auto;

            display: grid;
            grid-template-columns: repeat(7,1fr);

            gap: 10px;
        }

        .day{
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
            min-height: 100px;
            cursor: pointer;
        }

        .day:hover{
            background: #ddd;
        }

        .event{
            background: blue;
            color: white;
            padding: 5px;
            margin-top: 5px;
            border-radius: 5px;
            font-size: 12px;
        }

        .modal{
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-content{
            background: white;
            width: 300px;
            margin: 100px auto;
            padding: 20px;
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <h2>User Dashboard</h2>
</div>

<div class="calendar-header">

    <button onclick="prevMonth()">Prev</button>

    <span id="monthYear"></span>

    <button onclick="nextMonth()">Next</button>

</div>

<div class="calendar" id="calendar"></div>

<!-- MODAL -->

<div class="modal" id="modal">

    <div class="modal-content">

        <h3 id="selectedDateText"></h3>

        <input type="text" id="title" placeholder="Event Title">

        <label>Start Time</label>
        <input type="time" id="start">

        <label>End Time</label>
        <input type="time" id="end">

        <br><br>

        <button onclick="saveEvent()">Save</button>

        <button onclick="closeModal()">Cancel</button>

    </div>

</div>

<script>

let currentDate = new Date();

let selectedDate = "";

let events = {};

function showCalendar(){

    let month = currentDate.getMonth();

    let year = currentDate.getFullYear();

    let months = [
        "January","February","March","April",
        "May","June","July","August",
        "September","October","November","December"
    ];

    document.getElementById("monthYear").innerHTML =
    months[month] + " " + year;

    let daysInMonth =
    new Date(year, month + 1, 0).getDate();

    let calendar =
    document.getElementById("calendar");

    calendar.innerHTML = "";

    for(let i=1; i<=daysInMonth; i++){

        let fullDate =
        year + "-" + (month+1) + "-" + i;

        let day =
        document.createElement("div");

        day.className = "day";

        day.innerHTML = "<b>" + i + "</b>";

        day.onclick = function(){

            openModal(fullDate);
        };

        if(events[fullDate]){

            let e = document.createElement("div");

            e.className = "event";

            e.innerHTML =
            events[fullDate].title + "<br>" +
            events[fullDate].start + " - " +
            events[fullDate].end;

            day.appendChild(e);
        }

        calendar.appendChild(day);
    }
}

function openModal(date){

    selectedDate = date;

    document.getElementById("selectedDateText").innerHTML =
    "Selected Date : " + date;

    document.getElementById("modal").style.display =
    "block";
}

function closeModal(){

    document.getElementById("modal").style.display =
    "none";
}

function saveEvent(){

    let title =
    document.getElementById("title").value;

    let start =
    document.getElementById("start").value;

    let end =
    document.getElementById("end").value;

    events[selectedDate] = {

        title : title,

        start : start,

        end : end
    };

    closeModal();

    showCalendar();
}

function prevMonth(){

    currentDate.setMonth(
    currentDate.getMonth() - 1
    );

    showCalendar();
}

function nextMonth(){

    currentDate.setMonth(
    currentDate.getMonth() + 1
    );

    showCalendar();
}

showCalendar();

</script>

</body>
</html>
